<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Walletly</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- header -->
    <header class="bg-primary text-white p-3 mb-4" data-aos="fade-up">
        <div class="container d-flex align-items-center justify-content-center gap-3 mt-2">
            <img src="img/icons8-spese-50.png" alt="Icona" width="70" height="70">
            <h1 class="m-0">
                <div class="bold">Walletly</div>
            </h1>
        </div>
    </header>

    <main class="container-fluid px-3 px-md-4">

        <div class="row">
            <section class="mb-4" data-aos="fade-up">
                <h3>Aggiungi Spesa</h3>
                <form id="expense-form" class="row g-3">
                    <div class="col-12 col-md-3">
                        <input type="text" id="description" class="form-control" placeholder="Descrizione" required>
                    </div>
                    <div class="col-6 col-md-2">
                        <input type="number" id="amount" class="form-control" step="0.01" placeholder="Importo"
                            required>
                    </div>
                    <div class="col-6 col-md-2">
                        <select id="category" class="form-select" required>
                            <option value="">Categoria</option>
                            <option>Casa</option>
                            <option>Cibo</option>
                            <option>Trasporti</option>
                            <option>Tempo libero</option>
                            <option>Salute</option>
                            <option>Altro</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="date" id="date" class="form-control" required>
                    </div>
                    <div class="col-6 col-md-2">
                        <button type="submit" class="btn btn-success w-100">Aggiungi</button>
                    </div>
                </form>
            </section>
        </div>


        <div class="row">
            <section class="mb-4" data-aos="fade-up">
                <div class="row text-center g-3">
                    <div class="col-6">
                        <div class="card p-3">
                            <h5>Totale Spese</h5>
                            <h3 id="total">€0</h3>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card p-3">
                            <h5>Numero Spese</h5>
                            <h3 id="count">0</h3>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="row">
            <section class="mb-4" data-aos="fade-up">
                <input type="text" id="search" class="form-control" placeholder="Cerca per descrizione...">
            </section>
        </div>

        <!-- tabella -->
        <div class="row">
            <section data-aos="fade-up">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Descrizione</th>
                                <th>Importo</th>
                                <th>Categoria</th>
                                <th>Data</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <!--  grafico chart js -->
        <div class="row mt-4">
            <section class="mb-5" data-aos="fade-up">
                <h3>Spese per Categoria</h3>
                <div class="card p-3 p-md-4">
                    <canvas id="categoryChart"></canvas>
                </div>
            </section>
        </div>
        <!-- grafico linechart -->
        <div class="row mt-4">
            <section class="mb-5" data-aos="fade-up">
                <h3>Spese Settimanali</h3>
                <div class="card p-3 p-md-4">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </section>
        </div>

    </main>

    <!-- MODALE MODIFICA -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">✏️ Modifica Spesa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Chiudi"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Descrizione</label>
                        <input type="text" id="edit-description" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Importo (€)</label>
                        <input type="number" id="edit-amount" class="form-control" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select id="edit-category" class="form-select" required>
                            <option value="">Categoria</option>
                            <option>Casa</option>
                            <option>Cibo</option>
                            <option>Trasporti</option>
                            <option>Tempo libero</option>
                            <option>Salute</option>
                            <option>Altro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" id="edit-date" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-save" id="save-edit-btn">Salva modifiche</button>
                </div>
            </div>
        </div>
    </div>


    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
        <div class="col-md-4 d-flex align-items-center"> <a href="/"
                class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap"> <svg
                    class="bi" width="30" height="24" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> </a> <span class="mb-3 mb-md-0 text-body-primary">© 2026 Walletly, Inc</span> </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>
